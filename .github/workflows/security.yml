name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # Dependency vulnerability scanning
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate --json > npm-audit-results.json || true
          npm audit --audit-level=moderate

      - name: Run Snyk dependency scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --json-file-output=snyk-results.json

      - name: Upload vulnerability scan results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-results
          path: |
            npm-audit-results.json
            snyk-results.json

      - name: Create security issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Security vulnerabilities detected in dependencies';
            const body = `
            ## Security Alert
            
            High or critical security vulnerabilities have been detected in project dependencies.
            
            **Action Required:**
            1. Review the vulnerability scan results in the workflow artifacts
            2. Update affected dependencies to secure versions
            3. Test the application after updates
            4. Re-run security scans to verify fixes
            
            **Scan Details:**
            - Workflow: ${{ github.workflow }}
            - Run ID: ${{ github.run_id }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref }}
            
            Please address these vulnerabilities as soon as possible.
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'vulnerability', 'dependencies']
            });

  # Static code analysis
  static-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint security rules
        run: |
          npx eslint . --ext .js,.jsx,.ts,.tsx \
            --config .eslintrc.security.js \
            --format json \
            --output-file eslint-security-results.json || true

      - name: Run semgrep static analysis
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/nodejs
            p/typescript
            p/react
          generateSarif: "1"

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()

      - name: Run CodeQL analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # Container security scanning
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t complaint-system:security-scan .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'complaint-system:security-scan'
          format: 'sarif'
          output: 'trivy-container-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-container-results.sarif'

      - name: Run Hadolint Dockerfile scan
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint-results.sarif

      - name: Upload Hadolint results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: hadolint-results.sarif

      - name: Run Docker Bench security
        run: |
          docker run --rm --net host --pid host --userns host --cap-add audit_control \
            -e DOCKER_CONTENT_TRUST=$DOCKER_CONTENT_TRUST \
            -v /etc:/etc:ro \
            -v /usr/bin/containerd:/usr/bin/containerd:ro \
            -v /usr/bin/runc:/usr/bin/runc:ro \
            -v /usr/lib/systemd:/usr/lib/systemd:ro \
            -v /var/lib:/var/lib:ro \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            --label docker_bench_security \
            docker/docker-bench-security > docker-bench-results.txt || true

      - name: Upload container scan results
        uses: actions/upload-artifact@v4
        with:
          name: container-scan-results
          path: |
            trivy-container-results.sarif
            hadolint-results.sarif
            docker-bench-results.txt

  # Web application security testing
  web-security-scan:
    name: Web Application Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: complaint_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Setup database
        run: |
          npx prisma generate
          npx prisma db push
          npm run db:seed
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/complaint_test

      - name: Start application
        run: |
          npm start &
          sleep 30
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/complaint_test
          JWT_SECRET: test-secret-key
          NODE_ENV: production

      - name: Wait for application to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/api/health; then
              echo "Application is ready"
              break
            fi
            echo "Waiting for application to start..."
            sleep 5
          done

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Run OWASP ZAP full scan
        uses: zaproxy/action-full-scan@v0.8.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          allow_issue_writing: false

      - name: Upload ZAP scan results
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-results
          path: report_html.html

  # Infrastructure security scan
  infrastructure-scan:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,github_actions
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif

      - name: Run Terrascan IaC scan
        run: |
          docker run --rm -v "$(pwd):/iac" -w /iac tenable/terrascan scan \
            --iac-type docker \
            --output sarif \
            --output-file terrascan-results.sarif || true

      - name: Upload Terrascan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: terrascan-results.sarif
        if: always()

  # Secrets scanning
  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  # Security policy compliance
  compliance-check:
    name: Security Policy Compliance
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check security policy files
        run: |
          echo "Checking for required security files..."
          
          # Check for SECURITY.md
          if [ ! -f SECURITY.md ]; then
            echo "❌ SECURITY.md file missing"
            exit 1
          fi
          
          # Check for .github/SECURITY.md
          if [ ! -f .github/SECURITY.md ]; then
            echo "⚠️ .github/SECURITY.md file missing (optional but recommended)"
          fi
          
          # Check for security-related configuration files
          if [ ! -f .eslintrc.security.js ]; then
            echo "⚠️ Security-specific ESLint configuration missing"
          fi
          
          echo "✅ Security policy compliance check completed"

      - name: Validate security configuration
        run: |
          echo "Validating security configurations..."
          
          # Check Docker security configurations
          if grep -q "USER.*root" Dockerfile; then
            echo "❌ Dockerfile runs as root user"
            exit 1
          fi
          
          # Check for hardcoded secrets patterns
          if grep -r -E "(password|secret|key|token).*=.*['\"][^'\"]*['\"]" --include="*.js" --include="*.ts" --include="*.json" . --exclude-dir=node_modules --exclude-dir=.git; then
            echo "❌ Potential hardcoded secrets found"
            exit 1
          fi
          
          echo "✅ Security configuration validation completed"

  # Security report generation
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, static-analysis, container-scan, secrets-scan, compliance-check]
    if: always()
    
    steps:
      - name: Download all scan results
        uses: actions/download-artifact@v4

      - name: Generate security summary report
        run: |
          echo "# Security Scan Summary Report" > security-report.md
          echo "Generated: $(date)" >> security-report.md
          echo "" >> security-report.md
          
          echo "## Scan Results" >> security-report.md
          echo "| Scan Type | Status |" >> security-report.md
          echo "|-----------|--------|" >> security-report.md
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> security-report.md
          echo "| Static Analysis | ${{ needs.static-analysis.result }} |" >> security-report.md
          echo "| Container Scan | ${{ needs.container-scan.result }} |" >> security-report.md
          echo "| Secrets Scan | ${{ needs.secrets-scan.result }} |" >> security-report.md
          echo "| Compliance Check | ${{ needs.compliance-check.result }} |" >> security-report.md
          echo "" >> security-report.md
          
          # Add recommendations based on scan results
          echo "## Recommendations" >> security-report.md
          if [ "${{ needs.dependency-scan.result }}" = "failure" ]; then
            echo "- 🔴 **Critical**: Update vulnerable dependencies immediately" >> security-report.md
          fi
          if [ "${{ needs.secrets-scan.result }}" = "failure" ]; then
            echo "- 🔴 **Critical**: Remove exposed secrets from codebase" >> security-report.md
          fi
          if [ "${{ needs.container-scan.result }}" = "failure" ]; then
            echo "- 🟡 **Medium**: Address container security issues" >> security-report.md
          fi

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md

      - name: Comment security report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔒 Security Scan Results\n\n${report}`
            });

      - name: Notify security team on critical issues
        if: needs.dependency-scan.result == 'failure' || needs.secrets-scan.result == 'failure'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#security-alerts'
          text: |
            🚨 **CRITICAL SECURITY ISSUES DETECTED** 🚨
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Workflow: ${{ github.workflow }}
            
            **Failed Scans:**
            - Dependency Scan: ${{ needs.dependency-scan.result }}
            - Secrets Scan: ${{ needs.secrets-scan.result }}
            
            **Action Required:** Immediate review and remediation needed.
            View full report: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SECURITY_SLACK_WEBHOOK }}
